name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  backend:
    name: Backend (go build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290 # v-latest
        with:
          go-version: '1.24'
      - name: Build backend
        run: cd backend && go build -o chatta ./cmd

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - run: bun install --frozen-lockfile
      - name: Build frontend
        run: cd frontend && bun run build
