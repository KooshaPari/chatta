name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  secrets:
    name: Secrets Detection (trufflehog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: |
          pip install trufflehog
          trufflehog git file://. --since-commit HEAD --only-verified --fail || true
